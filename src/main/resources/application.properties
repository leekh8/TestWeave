spring.application.name=testweave

# 로컬 개발용 H2 인메모리 DB (무설치)
spring.datasource.url=jdbc:h2:mem:testweave
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 콘솔은 임의 SQL 실행 창구라 기본 프로파일에서는 끈다.
# 필요하면 dev 프로파일(application-dev.properties)로만 켜지며, 켜져도 인증이 걸린다.
spring.h2.console.enabled=false

# API 인증(HTTP Basic): 자격을 지정하지 않으면 기동 시 임의 비밀번호가 로그에 출력된다.
# 안정적 자격이 필요하면 환경변수로 주입:
#   SPRING_SECURITY_USER_NAME=admin SPRING_SECURITY_USER_PASSWORD=<강한값>

# 운영(PostgreSQL) 접속은 별도 프로파일로 분리 예정 (로드맵)
