<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TestWeave 보안 회귀 리포트</title>
    <style>
        :root { --bg:#0f172a; --card:#1e293b; --text:#e2e8f0; --muted:#94a3b8; --line:#334155; }
        body { margin:0; padding:24px; background:var(--bg); color:var(--text);
               font-family:'Segoe UI','Malgun Gothic',sans-serif; }
        h1 { font-size:1.4rem; margin:0 0 4px; }
        .sub { color:var(--muted); font-size:.85rem; margin-bottom:20px; }
        .summary { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:24px; }
        .kpi { background:var(--card); border:1px solid var(--line); border-radius:10px;
               padding:12px 18px; min-width:110px; }
        .kpi .num { font-size:1.5rem; font-weight:700; }
        .kpi .lbl { color:var(--muted); font-size:.78rem; }
        .kpi.alert .num { color:#f87171; }
        .kpi.ok .num { color:#4ade80; }
        .target { background:var(--card); border:1px solid var(--line); border-radius:10px;
                  padding:16px 20px; margin-bottom:16px; }
        .target h2 { font-size:1.05rem; margin:0 0 2px; }
        .target .url { color:var(--muted); font-size:.82rem; margin-bottom:12px; word-break:break-all; }
        table { width:100%; border-collapse:collapse; font-size:.86rem; }
        th, td { text-align:left; padding:7px 10px; border-bottom:1px solid var(--line); }
        th { color:var(--muted); font-weight:600; font-size:.78rem; }
        tr.regression { background:rgba(248,113,113,.12); }
        .badge { display:inline-block; padding:2px 9px; border-radius:99px;
                 font-size:.72rem; font-weight:700; }
        .badge.REGRESSION { background:#7f1d1d; color:#fecaca; }
        .badge.FIXED { background:#14532d; color:#bbf7d0; }
        .badge.NEW { background:#1e3a8a; color:#bfdbfe; }
        .badge.SAME { background:#334155; color:#cbd5e1; }
        .st-FAIL { color:#f87171; font-weight:700; }
        .st-PASS { color:#4ade80; }
        .error { background:rgba(248,113,113,.12); border:1px solid #7f1d1d;
                 border-radius:8px; padding:10px 14px; font-size:.85rem; word-break:break-all; }
        footer { color:var(--muted); font-size:.75rem; margin-top:20px; }
    </style>
</head>
<body>
    <h1>🧵 TestWeave 보안 회귀 리포트</h1>
    <div class="sub">생성: <span th:text="${generatedAt}">-</span></div>

    <div class="summary">
        <div class="kpi" th:classappend="${totalRegressions > 0} ? 'alert'">
            <div class="num" th:text="${totalRegressions}">0</div>
            <div class="lbl">REGRESSION (후퇴)</div>
        </div>
        <div class="kpi ok">
            <div class="num" th:text="${totalFixed}">0</div>
            <div class="lbl">FIXED (개선)</div>
        </div>
        <div class="kpi" th:classappend="${totalFails > 0} ? 'alert'">
            <div class="num" th:text="${totalFails}">0</div>
            <div class="lbl">FAIL (현재 미충족)</div>
        </div>
        <div class="kpi">
            <div class="num" th:text="${totalRules}">0</div>
            <div class="lbl">점검 규칙</div>
        </div>
        <div class="kpi" th:if="${totalErrors > 0}" th:classappend="'alert'">
            <div class="num" th:text="${totalErrors}">0</div>
            <div class="lbl">스캔 오류</div>
        </div>
    </div>

    <div class="target" th:each="t : ${reports}">
        <h2 th:text="${t.name}">target</h2>
        <div class="url" th:text="${t.url}">url</div>

        <div class="error" th:if="${t.hasError()}"
             th:text="'스캔 실패: ' + ${t.error}">스캔 실패</div>

        <table th:unless="${t.hasError()}">
            <thead>
                <tr><th>모듈</th><th>규칙</th><th>직전</th><th>현재</th><th>판정</th></tr>
            </thead>
            <tbody>
                <tr th:each="r : ${t.regressions}"
                    th:classappend="${r.verdict() == 'REGRESSION'} ? 'regression'">
                    <td th:text="${r.checkType()}">HEADER</td>
                    <td th:text="${r.rule()}">rule</td>
                    <td th:text="${r.previous()} ?: '—'">-</td>
                    <td><span th:text="${r.current()}" th:class="'st-' + ${r.current()}">-</span></td>
                    <td><span class="badge" th:classappend="${r.verdict()}"
                              th:text="${r.verdict()}">SAME</span></td>
                </tr>
            </tbody>
        </table>
    </div>

    <footer>TestWeave — 웹 보안 설정 회귀 스캐너. REGRESSION = 직전 PASS → 이번 FAIL (보안 후퇴).</footer>
</body>
</html>
