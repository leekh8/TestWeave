# CI 프로파일 — 서버 없이 스캔만 실행하고 종료
spring.main.web-application-type=none
spring.main.banner-mode=off

# baseline 영속: 인메모리 대신 H2 파일 DB (CI에서는 actions/cache로 data/ 유지)
spring.datasource.url=jdbc:h2:file:./data/testweave
spring.h2.console.enabled=false

# 스캔 대상 (콤마 구분)
testweave.ci.targets=https://leekh8.github.io
testweave.ci.check-types=HEADER,COOKIE,TLS
testweave.ci.report-dir=reports
