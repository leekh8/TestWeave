name: Security regression scan

on:
  schedule:
    - cron: '20 21 * * *'   # 매일 06:20 KST
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # baseline(H2 파일 DB)을 실행 간 유지 — 직전 스캔과 비교해야 회귀 판정이 성립
      - name: Restore baseline DB
        uses: actions/cache/restore@v4
        with:
          path: data
          key: scan-baseline-${{ github.run_id }}
          restore-keys: |
            scan-baseline-

      - name: Run scan (ci profile)
        run: |
          chmod +x gradlew
          ./gradlew bootRun --args='--spring.profiles.active=ci' --console=plain

      - name: Save baseline DB
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: scan-baseline-${{ github.run_id }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-report
          path: reports/
          retention-days: 30

      # 게이트: 회귀·스캔오류는 항상 실패. FAIL_ON=fail 이면 상시 FAIL(회귀는 아니지만
      # 계속 취약한 상태 — 신규 대상이 첫날부터 미충족인 경우 등)도 실패로 승격한다.
      - name: Fail on regression
        env:
          FAIL_ON: regression   # regression(기본) | fail(상시 FAIL도 빌드 실패)
        run: |
          regressions=$(jq -r '.regressions' reports/summary.json)
          errors=$(jq -r '.errors' reports/summary.json)
          fails=$(jq -r '.fails' reports/summary.json)
          echo "REGRESSION=$regressions FAIL=$fails ERROR=$errors (gate=$FAIL_ON)"
          bad=0
          [ "$regressions" != "0" ] && bad=1
          [ "$errors" != "0" ] && bad=1
          [ "$FAIL_ON" = "fail" ] && [ "$fails" != "0" ] && bad=1
          if [ "$bad" != "0" ]; then
            echo "::error::회귀 $regressions건 / 상시FAIL $fails건 / 스캔오류 $errors건 (gate=$FAIL_ON) — 리포트 아티팩트 확인"
            exit 1
          fi
